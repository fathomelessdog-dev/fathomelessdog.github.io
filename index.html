<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FathomelessDog Games</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
      color: #fff;
      text-align: center;
    }

    header {
      padding: 40px 20px;
      background: #111;
      border-bottom: 2px solid #333;
    }

    h1 {
      font-size: 48px;
      margin: 0;
      letter-spacing: 2px;
    }

    p.subtitle {
      font-size: 18px;
      color: #aaa;
      margin-top: 10px;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
      padding: 40px;
      max-width: 1000px;
      margin: auto;
    }

    .game-card {
      background: #181818;
      padding: 20px;
      border-radius: 12px;
      transition: 0.2s;
      border: 1px solid #333;
    }

    .game-card:hover {
      transform: translateY(-5px);
      border-color: #4af;
      box-shadow: 0 0 15px #4af5;
    }

    .game-card a {
      color: #4af;
      text-decoration: none;
      font-size: 20px;
      font-weight: bold;
    }
    .game-card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 15px;
}


    footer {
      margin-top: 40px;
      padding: 20px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
